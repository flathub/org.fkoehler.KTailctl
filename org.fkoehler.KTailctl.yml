app-id: org.fkoehler.KTailctl
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
command: ktailctl
finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=ipc
  - --share=network
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=/run/tailscale:ro
build-options:
  prepend-path: /usr/lib/sdk/golang/bin
modules:
  - name: ktailctl
    buildsystem: cmake-ninja
    config-opts:
      - -DKTAILCTL_FLATPAK_BUILD=ON
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
    sources:
      - type: git
        url: https://github.com/f-koehler/KTailctl.git
        tag: v0.22.0-beta2
        commit: 7ccc3ef8cd2008b8c6053370a66d2bcc1413c80f
      - type: archive
        url: https://github.com/f-koehler/KTailctl/releases/download/v0.22.0-beta2/ktailctl-wrapper-vendor-v0.22.0-beta2.tar.gz
        sha256: 405d65b7ed90af67845e76f53e9548fadbf9003a23961a747825dd81614df408
        strip-components: 0
        dest: src/tailscale/wrapper
