app-id: org.fkoehler.KTailctl
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.golang
command: ktailctl
finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=ipc
  - --talk-name=org.kde.StatusNotifierWatcher
  - --filesystem=/run/tailscale:ro
build-options:
  prepend-path: /usr/lib/sdk/golang/bin
modules:
  - name: kirigami-addons
    buildsystem: cmake-ninja
    config-opts:
      - "-DBUILD_TESTING=OFF"
      - "-DCMAKE_BUILD_TYPE=RelWithDebInfo"
    sources:
      - type: "archive"
        url: "https://download.kde.org/stable/kirigami-addons/kirigami-addons-0.10.0.tar.xz"
        sha256: "9897e70bf167f579cec06d09d49a9a27aba184cbd1b2fce2c3ae757a87b01216"
        x-checker-data:
          type: "anitya"
          project-id: 242933
          stable-only: true
          url-template: "https://download.kde.org/stable/kirigami-addons/kirigami-addons-$version.tar.xz"
  - name: ktailctl
    buildsystem: cmake-ninja
    config-opts:
      - -DKTAILCTL_FLATPAK_BUILD=ON
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
    sources:
      - type: git
        url: https://github.com/f-koehler/KTailctl.git
        tag: v0.22.0-beta1
        commit: 8715e0a544df52fe84d927f964f986f7649d5e2f
      - type: archive
        url: https://github.com/f-koehler/KTailctl/releases/download/v0.22.0-beta1/ktailctl-wrapper-vendor-v0.22.0-beta1.tar.gz
        sha256: 1ec339e257fbdadf37cc4e1664c8ce76e4cac52318815704f5675f6734c7d81a
        strip-components: 0
        dest: src/tailscale/wrapper
